services:
  # Backend: FastAPI + PyTorch PINN
  - type: web
    name: hisarna-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python model/train.py --demo
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend: React + Vite Static Site
  - type: web
    name: hisarna-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://hisarna-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://hisarna-backend.onrender.com
